<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Investment Analysis</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.logo{
    font-size:48px;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

.title{
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    opacity:.8;
    margin-bottom:30px;
}

.progress-container{
    width:350px;
    max-width:90%;
}

.progress-bar{
    height:12px;
    background:#334155;
    border-radius:50px;
    overflow:hidden;
}

.progress-fill{
    width:0%;
    height:100%;
    border-radius:50px;
    background:linear-gradient(
        90deg,
        #22c55e,
        #3b82f6
    );
    transition:0.3s;
}

.percent{
    margin-top:10px;
    font-weight:bold;
}

.loading-text{
    margin-top:15px;
    opacity:.8;
}

.footer{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    font-size:12px;
    opacity:.65;
    line-height:1.8;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

.fade-out{
    animation:fadeOut .8s forwards;
}

@keyframes fadeOut{
    to{
        opacity:0;
        transform:translateY(-10px);
    }
}

</style>
</head>

<body>

<div class="container" id="container">

    <div class="logo">📈</div>

    <div class="title">
        AB Investment Analysis
    </div>

    <div class="subtitle">
        Sistema de Análise de Investimentos
    </div>

    <div class="progress-container">

        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>

        <div class="percent" id="percent">
            0%
        </div>

        <div class="loading-text" id="loadingText">
            Inicializando sistema...
        </div>

    </div>

</div>

<div class="footer">
    © 2026 Corporação Gênesis — AB Investment Analysis
    <br>
    POWERED BY SASSA CORPORATION
</div>

<script>

let progress = 0;

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const text = document.getElementById("loadingText");

const interval = setInterval(() => {

    progress += Math.random() * 3;

    if(progress >= 100){

        progress = 100;

        fill.style.width = progress + "%";
        percent.innerText = "100%";
        text.innerText = "Sistema pronto.";

        clearInterval(interval);

        document
            .getElementById("container")
            .classList
            .add("fade-out");

        setTimeout(() => {

            window.location.href = "index.html";

        }, 900);

        return;
    }

    fill.style.width = progress + "%";
    percent.innerText = Math.floor(progress) + "%";

    if(progress < 25){
        text.innerText = "Inicializando sistema...";
    }
    else if(progress < 50){
        text.innerText = "Carregando módulos...";
    }
    else if(progress < 75){
        text.innerText = "Processando componentes...";
    }
    else{
        text.innerText = "Preparando ambiente...";
    }

},180);

</script>

</body>
</html>
