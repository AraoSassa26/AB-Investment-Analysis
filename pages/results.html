<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultados</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
    padding:30px;
    margin:0;
}

/* =========================
   HEADER
========================= */

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

/* =========================
   KPI BANK STYLE
========================= */

.kpi-container{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.kpi{
    background:#1e293b;
    padding:15px 20px;
    border-radius:12px;
    min-width:160px;
    flex:1;
    text-align:center;
    transition:0.3s;
    border:2px solid transparent;
}

.kpi h3{
    font-size:13px;
    opacity:0.7;
    margin-bottom:5px;
}

.kpi p{
    font-size:18px;
    font-weight:bold;
    margin:0;
}

/* STATES */
.kpi.positive{ border-color:#22c55e; background:rgba(34,197,94,0.08); }
.kpi.negative{ border-color:#ef4444; background:rgba(239,68,68,0.08); }
.kpi.neutral{ border-color:#f59e0b; background:rgba(245,158,11,0.08); }

/* =========================
   CONCLUSÃO
========================= */

.conclusao{
    margin-top:10px;
    font-size:16px;
    padding:12px;
    border-left:4px solid #2563eb;
    background:#0b1220;
    border-radius:8px;
}

/* =========================
   CHART CARDS
========================= */

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    display:none;
}

.card.active{
    display:block;
}

.card canvas{
    height:320px !important;
}

/* =========================
   BUTTONS
========================= */

.btn{
    padding:10px 15px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    margin-right:10px;
}

.btn:hover{
    background:#1d4ed8;
}

/* =========================
   TOGGLE AREA
========================= */

.toggle-area{
    margin-bottom:15px;
}

</style>
</head>

<body onload="mostrar()">

<div class="title">📊 Resultados da Análise</div>

<!-- KPIs -->
<div class="kpi-container">

    <div class="kpi">
        <h3>VPL</h3>
        <p id="vpl"></p>
    </div>

    <div class="kpi">
        <h3>ROI</h3>
        <p id="roi"></p>
    </div>

    <div class="kpi">
        <h3>TIR</h3>
        <p id="tir"></p>
    </div>

    <div class="kpi">
        <h3>Payback</h3>
        <p id="payback"></p>
    </div>

</div>

<!-- CONCLUSÃO -->
<div class="conclusao" id="conclusao">A processar...</div>

<br> 

<br>

<br>



<!-- TOGGLE BUTTONS -->
<div class="toggle-area">
    <button class="btn" onclick="toggleChart('c1')">📊 Fluxo de Caixa</button>
    <button class="btn" onclick="toggleChart('c2')">📈 Fluxo Acumulado</button>
</div>

<!-- CHART 1 -->
<div class="card active" id="c1-card">
<canvas id="c1"></canvas>
</div>

<!-- CHART 2 -->
<div class="card active" id="c2-card">
<canvas id="c2"></canvas>
</div>

<!-- ACTIONS -->
<button class="btn" onclick="window.print()">📄 Exportar PDF</button>

<script src="../assets/js/resultados.js"></script>

<script>
function toggleChart(id){

    let el = document.getElementById(id + "-card");

    el.classList.toggle("active");

}
</script>

</body>
</html>
