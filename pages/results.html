<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultados</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
    padding:30px;
    margin:0;
}

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

/* =========================
   KPIs BANK STYLE
========================= */

.kpi-container{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.kpi{
    background:#1e293b;
    padding:15px 20px;
    border-radius:12px;
    min-width:160px;
    flex:1;
    text-align:center;
    transition:0.3s;
    border:2px solid transparent;
}

.kpi h3{
    font-size:13px;
    opacity:0.7;
    margin-bottom:5px;
}

.kpi p{
    font-size:18px;
    font-weight:bold;
    margin:0;
}

/* 🟢 POSITIVO */
.kpi.positive{
    border-color:#22c55e;
    background:rgba(34,197,94,0.08);
}

/* 🔴 NEGATIVO */
.kpi.negative{
    border-color:#ef4444;
    background:rgba(239,68,68,0.08);
}

/* 🟡 NEUTRO */
.kpi.neutral{
    border-color:#f59e0b;
    background:rgba(245,158,11,0.08);
}

/* =========================
   CONCLUSÃO
========================= */

.conclusao{
    margin-top:10px;
    font-size:16px;
    padding:10px;
    border-left:4px solid #2563eb;
    background:#0b1220;
}

/* =========================
   CHARTS
========================= */

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

/* =========================
   BOTÃO
========================= */

.btn{
    padding:10px 15px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body onload="mostrar()">


<!-- KPIs -->
<div class="kpi-container">

    <div class="kpi">
        <h3>VPL</h3>
        <p id="vpl"></p>
    </div>

    <div class="kpi">
        <h3>ROI</h3>
        <p id="roi"></p>
    </div>

    <div class="kpi">
        <h3>TIR</h3>
        <p id="tir"></p>
    </div>

    <div class="kpi">
        <h3>Payback</h3>
        <p id="payback"></p>
    </div>

</div>

<!-- CONCLUSÃO -->
<div class="conclusao" id="conclusao">A processar...</div>

<!-- GRÁFICO 1 -->
<div class="card">
<canvas id="c1"></canvas>
</div>

<!-- GRÁFICO 2 -->
<div class="card">
<canvas id="c2"></canvas>
</div>

<button class="btn" onclick="window.print()">📄 Exportar PDF</button>

<script src="../assets/js/resultados.js"></script>

</body>
</html>
